services:
  # ── Chainlit UI  (http://localhost:8000) ─────────────────────────────────
  chainlit:
    build: .
    command: chainlit run interfaces/chainlit_app.py --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped

  # ── FastAPI REST  (http://localhost:8001/docs) ───────────────────────────
  api:
    build: .
    command: uvicorn interfaces.api:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    env_file: .env
    restart: unless-stopped
